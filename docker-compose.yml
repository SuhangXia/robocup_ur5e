# version 已废弃，Docker Compose V2 不再需要
services:
  # ============================================================================
  # RoboCup Brain (Suhang's Decision Node)
  # ============================================================================
  robocup_brain:
    build:
      context: .
      dockerfile: docker/Dockerfile.brain
    image: robocup_ur5e/brain:latest
    container_name: robocup_brain
    network_mode: "host"  # 最小化延迟
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - ROS_IP=${ROS_IP:-127.0.0.1}
      - DISPLAY=${DISPLAY}
    volumes:
      - ./src/common_msgs:/workspace/src/common_msgs:ro
      - ./src/robocup_brain:/workspace/src/robocup_brain:ro
      - ./src/motion_control:/workspace/src/motion_control:ro
      - ./scripts:/workspace/scripts:ro  # 系统脚本
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  # GUI 支持
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ============================================================================
  # Perception YOLO (Fazhan & Ruiyi's Detection Node)
  # ============================================================================
  perception_yolo:
    build:
      context: .
      dockerfile: docker/Dockerfile.yolo
    image: robocup_ur5e/perception_yolo:latest
    container_name: perception_yolo
    network_mode: "host"
    runtime: nvidia  # 启用 NVIDIA GPU
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - ROS_IP=${ROS_IP:-127.0.0.1}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DISPLAY=${DISPLAY}
    volumes:
      - ./src/common_msgs:/workspace/src/common_msgs:ro
      - ./src/perception_yolo:/workspace/src/perception_yolo:rw
      - ./scripts:/workspace/scripts:ro  # 系统脚本
      - ./weights:/workspace/weights:rw  # 权重目录
      - /home/liufazhan/pics:/workspace/pics:rw  # 图片输出目录
      - ./.cursor:/home/liufazhan/robocup_ur5e/.cursor:rw  # debug 日志挂载
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ============================================================================
  # Perception YOLO GPU (ROSBridge + PyTorch nightly)
  # ============================================================================
  perception_yolo_gpu:
    build:
      context: .
      dockerfile: docker/Dockerfile.yolo_gpu
    image: robocup_ur5e/perception_yolo_gpu:latest
    container_name: perception_yolo_gpu
    network_mode: "host"
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./weights:/workspace/weights:rw
      - ./scripts:/workspace/scripts:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true

  # ============================================================================
  # Perception Grasp (Muye Yuan's Grasp Estimation Node)
  # ============================================================================
  perception_grasp:
    build:
      context: .
      dockerfile: docker/Dockerfile.grasp
    image: robocup_ur5e/perception_grasp:latest
    container_name: perception_grasp
    network_mode: "host"
    runtime: nvidia  # 启用 NVIDIA GPU (CUDA 11.3)
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - ROS_IP=${ROS_IP:-127.0.0.1}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DISPLAY=${DISPLAY}
    volumes:
      - ./src/common_msgs:/workspace/src/common_msgs:ro
      - ./src/perception_grasp:/workspace/src/perception_grasp:ro
      - ./scripts:/workspace/scripts:ro  # 系统脚本
      - ./graspnet_checkpoints:/workspace/graspnet_checkpoints:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ============================================================================
  # Path Planning (Sarvin & Chang - ACO+RRT* 混合规划)
  # ============================================================================
  path_planning:
    build:
      context: .
      dockerfile: docker/Dockerfile.path_planning
    image: robocup_ur5e/path_planning:latest
    container_name: path_planning
    network_mode: "host"
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - ROS_IP=${ROS_IP:-127.0.0.1}
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - ./src/common_msgs:/workspace/src/common_msgs:ro
      - ./src/path_planning:/workspace/src/path_planning:ro
      - ./scripts:/workspace/scripts:ro
      - ./path_planning_viz:/workspace/viz_output:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    restart: unless-stopped
    stdin_open: true
    tty: true

# ============================================================================
# 网络配置
# ============================================================================
# 使用 host 模式，无需额外网络配置
